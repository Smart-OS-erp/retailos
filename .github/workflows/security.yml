name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  security:
    name: Security foundation checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Reject service role in client source
        run: node scripts/security/no-service-role-client.ts
      - name: Reject static dashboard data
        run: node scripts/security/no-static-dashboard-data.ts
      - name: Flag unprotected API routes
        run: node scripts/security/no-unprotected-api-route.ts
      - name: Flag unscoped Supabase queries
        run: node scripts/security/no-unscoped-supabase-query.ts
      - name: Verify tenant-table RLS declarations
        run: node scripts/security/verify-rls-policies.ts
      - name: Security status
        run: echo "Current checks are harness heuristics/TODOs and must be replaced or extended as implementation surfaces are added."
